name: Build and publish blst binaries

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'blst tag to build (defaults to v0.3.15 when omitted)'
        required: false
        type: string

permissions:
  contents: write

env:
  DEFAULT_BLST_TAG: v0.3.15

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-amd64
            cross_compile: ''
          - os: ubuntu-latest
            asset_name: linux-arm64
            cross_compile: aarch64-linux-gnu-
          - os: macos-15-intel
            asset_name: macos-amd64
            cross_compile: ''
          - os: macos-14
            asset_name: macos-arm64
            cross_compile: ''
          - os: windows-latest
            asset_name: windows-amd64
            cross_compile: ''
            msvc_arch: amd64
          - os: windows-latest
            asset_name: windows-arm64
            cross_compile: ''
            msvc_arch: amd64_arm64

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${DEFAULT_BLST_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Checkout blst
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.tag.outputs.tag }}" https://github.com/supranational/blst.git blst

      - name: Install Linux cross compiler
        if: matrix.cross_compile != ''
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build blst (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: blst
        run: |
          if [ -n "${{ matrix.cross_compile }}" ]; then
            CROSS_COMPILE="${{ matrix.cross_compile }}" ./build.sh -shared
          elif [ "$(uname -s)" = "Darwin" ]; then
            # build.sh -shared has a bug on macOS: the dylib linker runs in a
            # subshell "(...);" followed by "exit 0", so POSIX sh set -e does
            # not propagate a linker failure and the script exits 0 with no
            # dylib produced. Build the static lib first, then link explicitly.
            ./build.sh
            echo "Static lib built:"
            ls -lh libblst.a
            cc -dynamiclib -o libblst.dylib -all_load libblst.a \
              -O2 -fno-builtin -fPIC
            echo "Dynamic lib built:"
            ls -lh libblst.dylib
          else
            ./build.sh -shared
          fi

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build blst (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: blst
        run: build.bat -dll

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          while IFS= read -r lib_path; do
            lib_name="$(basename "$lib_path")"
            case "$lib_name" in
              libblst.so)
                out_name="blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.so"
                ;;
              libblst.dylib)
                out_name="blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.dylib"
                ;;
              blst.dll)
                out_name="blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.dll"
                ;;
              *)
                echo "Skipping unexpected artifact: $lib_name"
                continue
                ;;
            esac

            cp "$lib_path" "dist/$out_name"
          done < <(find blst -maxdepth 1 -type f \( -name 'libblst.so' -o -name 'libblst.dylib' -o -name 'blst.dll' \))

          if [ "$(find dist -type f | wc -l)" -eq 0 ]; then
            echo "No build artifacts found"
            exit 1
          fi

          echo "Prepared artifacts:"
          find dist -maxdepth 1 -type f -exec basename {} \;

      - name: Upload per-target artifact
        uses: actions/upload-artifact@v4
        with:
          name: blst-${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: build
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${DEFAULT_BLST_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: blst-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
          overwrite_files: true
