name: Build and publish blst binaries

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'blst tag to build (defaults to v0.3.15 when omitted)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: blst-release-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  DEFAULT_BLST_TAG: v0.3.15

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-amd64
            cross_compile: ''
          - os: ubuntu-latest
            asset_name: linux-arm64
            cross_compile: aarch64-linux-gnu-
          - os: macos-15-intel
            asset_name: macos-amd64
            cross_compile: ''
          - os: macos-14
            asset_name: macos-arm64
            cross_compile: ''
          - os: windows-latest
            asset_name: windows-amd64
            cross_compile: ''
            msvc_arch: x64
          - os: windows-latest
            asset_name: windows-arm64
            cross_compile: ''
            msvc_arch: amd64_arm64

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${DEFAULT_BLST_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Checkout blst
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.tag.outputs.tag }}" https://github.com/supranational/blst.git blst

      - name: Install Linux cross compiler
        if: matrix.cross_compile != ''
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build blst (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: blst
        run: |
          if [ -n "${{ matrix.cross_compile }}" ]; then
            CROSS_COMPILE="${{ matrix.cross_compile }}" ./build.sh
          else
            ./build.sh
          fi

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build blst (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: blst
        run: build.bat

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find blst -maxdepth 1 -type f \( -name 'libblst.a' -o -name 'libblst.so' -o -name 'libblst.dylib' -o -name 'blst.lib' -o -name 'blst.dll' \) -exec cp {} dist/ \;
          if [ "$(find dist -type f | wc -l)" -eq 0 ]; then
            echo "No build artifacts found"
            exit 1
          fi
          tar -czf "blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.tar.gz" -C dist .

      - name: Upload per-target artifact
        uses: actions/upload-artifact@v4
        with:
          name: blst-${{ matrix.asset_name }}
          path: blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: build
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            echo "Release job requires an explicit workflow_dispatch tag or a tag ref."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: blst-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*.tar.gz
          generate_release_notes: true
