name: Build and publish blst binaries

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'blst tag to build (required when manually dispatched from a branch)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-x86_64
            cmake_args: ''
            cc: ''
            cxx: ''
          - os: ubuntu-latest
            asset_name: linux-aarch64
            cmake_args: '-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64'
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
          - os: macos-13
            asset_name: macos-x86_64
            cmake_args: '-DCMAKE_OSX_ARCHITECTURES=x86_64'
            cc: ''
            cxx: ''
          - os: macos-14
            asset_name: macos-arm64
            cmake_args: '-DCMAKE_OSX_ARCHITECTURES=arm64'
            cc: ''
            cxx: ''
          - os: windows-latest
            asset_name: windows-x86_64
            cmake_args: ''
            cc: ''
            cxx: ''

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="snapshot-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Checkout blst
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.tag.outputs.tag }}" https://github.com/supranational/blst.git blst

      - name: Install Linux cross compiler
        if: startsWith(matrix.asset_name, 'linux-aarch64')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure and build
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S blst -B blst/build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}
          cmake --build blst/build --config Release --parallel

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find blst/build -type f \( -name 'libblst.a' -o -name 'libblst.so' -o -name 'libblst.dylib' -o -name 'blst.lib' -o -name 'blst.dll' \) -exec cp {} dist/ \;
          if [ "$(find dist -type f | wc -l)" -eq 0 ]; then
            echo "No build artifacts found"
            exit 1
          fi
          tar -czf "blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.tar.gz" -C dist .

      - name: Upload per-target artifact
        uses: actions/upload-artifact@v4
        with:
          name: blst-${{ matrix.asset_name }}
          path: blst-${{ steps.tag.outputs.tag }}-${{ matrix.asset_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: build
    if: github.ref_type == 'tag' || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            echo "A tag must be provided for workflow_dispatch runs triggered from branches."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: blst-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*.tar.gz
          generate_release_notes: true
